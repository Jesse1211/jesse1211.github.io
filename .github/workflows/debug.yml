name: React Node.js (Debug)

on:
  pull_request:
    paths-ignore:
      - "**.md"
      
jobs:
  build-and-deploy:
    name: 'Build and Depoly'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
        
      - name: Install Dependencies
        run: npm install
      
      - name: Build
        run: npm run build
